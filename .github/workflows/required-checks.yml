name: Required Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  reproduced-kernel-testline:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prove deterministic reproduction (verify-only)
        run: npm run check:required:verify-only

      - name: Upload required-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: required-check-report
          path: runtime/evidence/required-check-report.json
