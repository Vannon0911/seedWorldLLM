<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeedWorld - Game UI</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-left">
                <h1>SeedWorld</h1>
                <span class="mode-indicator">GAME MODE</span>
            </div>
            <div class="header-right">
                <button id="openPatcher" class="mode-toggle">
                    <span class="toggle-text">Open Patch Control</span>
                </button>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot offline"></span>
                    <span class="status-text">Offline</span>
                </div>
            </div>
        </header>

        <main id="gameMode" class="mode-content game-mode"></main>
    </div>

    <script type="module">
        import { GameLogicController } from './src/game/GameLogicController.js';
        import { GameUIController } from './src/ui/GameUIController.js';

        const gameMode = document.getElementById('gameMode');
        const openPatcher = document.getElementById('openPatcher');
        const statusElement = document.getElementById('connectionStatus');
        const statusDot = statusElement.querySelector('.status-dot');
        const statusText = statusElement.querySelector('.status-text');

        openPatcher.addEventListener('click', () => {
            window.location.href = './patch';
        });

        function initializeWebSocket() {
            const ws = new WebSocket('ws://localhost:8080');

            ws.onopen = () => {
                statusDot.classList.remove('offline');
                statusDot.classList.add('online');
                statusText.textContent = 'Connected';
            };

            ws.onclose = () => {
                statusDot.classList.remove('online');
                statusDot.classList.add('offline');
                statusText.textContent = 'Offline';
            };

            ws.onerror = () => {
                statusDot.classList.remove('online');
                statusDot.classList.add('offline');
                statusText.textContent = 'Offline';
            };
        }

        document.addEventListener('DOMContentLoaded', async () => {
            initializeWebSocket();
            const gameController = new GameLogicController();
            const gameUIController = new GameUIController(gameController);
            await gameUIController.initialize(gameMode);
        });
    </script>
</body>
</html>
