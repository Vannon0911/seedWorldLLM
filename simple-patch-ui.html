<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Patch Manager - SeedWorld</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .simple-patch-layout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .simple-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .simple-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .simple-header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .upload-area, .validation-area, .module-area {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .upload-area h2, .validation-area h2, .module-area h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .drop-zone {
            border: 3px dashed #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .drop-zone.drag-over {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .drop-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .browse-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .browse-btn:hover {
            background: #5a6fd8;
        }

        .upload-info {
            margin-top: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

        .validation-controls, .module-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .validate-all-btn, .clear-btn, .organize-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .validate-all-btn {
            background: #28a745;
            color: white;
        }

        .validate-all-btn:hover {
            background: #218838;
        }

        .clear-btn {
            background: #dc3545;
            color: white;
        }

        .clear-btn:hover {
            background: #c82333;
        }

        .organize-btn {
            background: #17a2b8;
            color: white;
        }

        .organize-btn:hover {
            background: #138496;
        }

        .module-filter {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .validation-list, .module-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .validation-item {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .validation-item.valid {
            border-left: 4px solid #28a745;
        }

        .validation-item.invalid {
            border-left: 4px solid #dc3545;
        }

        .validation-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .file-name {
            font-weight: bold;
        }

        .validation-message {
            color: #666;
            margin-bottom: 8px;
        }

        .validation-time {
            font-size: 0.8rem;
            color: #999;
        }

        .module-item {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .module-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .module-icon {
            font-size: 2rem;
        }

        .module-info h3 {
            margin-bottom: 5px;
        }

        .module-info p {
            color: #666;
            font-size: 0.9rem;
        }

        .module-patches {
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .patch-item {
            background: #f8f9fa;
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .patch-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .patch-id {
            font-weight: bold;
            color: #333;
        }

        .patch-version {
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #666;
        }

        .patch-description {
            color: #666;
            font-size: 0.9rem;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .simple-patch-layout {
                padding: 10px;
            }
            
            .upload-area, .validation-area, .module-area {
                padding: 20px;
            }
            
            .simple-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Simple Patch UI will be rendered here -->
    </div>

    <script type="module">
        import { KernelController } from './src/kernel/KernelController.js';
        import { SimplePatchUIController } from './src/ui/SimplePatchUIController.js';

        // Initialize
        const kernel = new KernelController();
        const simplePatchUI = new SimplePatchUIController(kernel);
        
        // Make globally accessible for button onclick handlers
        window.simplePatchUI = simplePatchUI;

        // Initialize UI
        document.addEventListener('DOMContentLoaded', async () => {
            await simplePatchUI.initialize(document.getElementById('app'));
            console.log('[SIMPLE_PATCH] Simple Patch Manager ready!');
        });
    </script>
</body>
</html>
