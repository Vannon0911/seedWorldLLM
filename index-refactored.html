<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeedWorld - Deterministic Kernel Interface</title>
    <link rel="stylesheet" href="src/styles.css">
    <style>
        /* Main Menu Styles */
        .main-menu-layout {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .menu-brand h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(45deg, #00ff88, #00bbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .menu-subtitle {
            margin: 0.5rem 0 0 0;
            color: #a0a0a0;
            font-size: 1.1rem;
        }

        .menu-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-end;
        }

        .connection-status, .kernel-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
        }

        .status-dot.online {
            background: #44ff44;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem;
            flex: 1;
        }

        .mode-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .mode-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .mode-card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .mode-icon {
            font-size: 2rem;
        }

        .mode-name {
            font-size: 1.5rem;
            margin: 0;
        }

        .mode-description {
            color: #a0a0a0;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .mode-launch-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(45deg, #00ff88, #00bbff);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-launch-btn:hover:not(.disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        .mode-launch-btn.disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .status-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-section h4 {
            margin: 0 0 1rem 0;
            color: #00ff88;
        }

        .status-items {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .activity-log {
            max-height: 150px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .activity-item {
            padding: 0.25rem 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .activity-item.error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .activity-time {
            color: #888;
            margin-right: 0.5rem;
        }

        /* Mode Switcher */
        .mode-switcher {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1000;
        }

        .back-to-menu-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-to-menu-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: #fff;
            font-weight: 500;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            background: rgba(255, 68, 68, 0.9);
        }

        .toast.success {
            background: rgba(68, 255, 68, 0.9);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Existing game styles */
        .game-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 1rem;
            padding: 1rem;
            height: 100vh;
        }

        .game-sidebar {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .hud-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1rem;
        }

        .hud-panel h3 {
            margin: 0 0 1rem 0;
            color: #00ff88;
        }

        .resource-display, .stats-display {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .resource, .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .game-main {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .game-world {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            overflow: auto;
        }

        .game-status {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        /* Tile Grid Styles */
        .tile-grid {
            display: grid;
            gap: 2px;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px;
            border-radius: 4px;
        }

        .tile {
            --tile-size: 84px;
            width: var(--tile-size);
            height: var(--tile-size);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .tile:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        .tile--selected {
            box-shadow: 0 0 0 3px #00ff88;
        }

        .tile__terrain {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
        }

        .tile__structure {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
        }

        .tile__shine {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.2) 50%, transparent 60%);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .tile:hover .tile__shine {
            opacity: 1;
        }

        .tile__label {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 8px;
            padding: 1px 3px;
            border-radius: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Application will be initialized here -->
    </div>

    <!-- Refactored Kernel Bridge Script -->
    <script type="module">
        import { KernelController } from './src/kernel/KernelController.js';
        import { GameLogicController } from './src/game/GameLogicController.js';
        import { MainMenuController } from './src/ui/MainMenuController.js';
        import { KernelGates } from './src/kernel/KernelGates.js';

        // Global application state
        window.appState = {
            kernel: new KernelController(),
            gameController: new GameLogicController(),
            kernelGates: null,
            mainMenuController: null,
            wsConnection: null,
            activePatches: new Map()
        };

        // Initialize kernel gates
        window.appState.kernelGates = new KernelGates(window.appState.kernel);

        // WebSocket connection for live updates
        function initializeWebSocket() {
            const ws = new WebSocket('ws://localhost:8080');

            ws.onopen = () => {
                console.log('[APP] WebSocket connected');
                window.appState.wsConnection = ws;
                updateConnectionStatus(true);
            };

            ws.onclose = () => {
                console.log('[APP] WebSocket disconnected');
                window.appState.wsConnection = null;
                updateConnectionStatus(false);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };

            return ws;
        }

        function updateConnectionStatus(connected) {
            if (window.appState.mainMenuController) {
                window.appState.mainMenuController.updateConnectionStatus();
            }
        }

        function handleWebSocketMessage(data) {
            switch (data.type) {
                case 'patchUpdate':
                    updatePatchList(data.patches);
                    break;
                case 'validationResult':
                    displayValidationResult(data.result);
                    break;
                case 'kernelState':
                    updateGameState(data.state);
                    break;
                case 'gateUpdate':
                    updateGateStatus(data.gates);
                    break;
            }
        }

        function updatePatchList(patches) {
            window.appState.activePatches.clear();
            patches.forEach(patch => {
                window.appState.activePatches.set(patch.id, patch);
            });
        }

        function displayValidationResult(result) {
            console.log('[APP] Validation result:', result);
        }

        function updateGameState(state) {
            // Update game state if game controller is active
            if (window.appState.mainMenuController?.getCurrentController()?.updateState) {
                window.appState.mainMenuController.getCurrentController().updateState(state);
            }
        }

        function updateGateStatus(gates) {
            // Update gate status if dev controller is active
            if (window.appState.mainMenuController?.getCurrentController()?.updateGateStatus) {
                window.appState.mainMenuController.getCurrentController().updateGateStatus(gates);
            }
        }

        // Initialize application
        async function initializeApplication() {
            try {
                console.log('[APP] Initializing SeedWorld Application...');
                
                // Initialize WebSocket
                initializeWebSocket();
                
                // Initialize main menu controller
                window.appState.mainMenuController = new MainMenuController(
                    window.appState.kernel
                );
                
                await window.appState.mainMenuController.initialize(document.getElementById('app'));
                
                console.log('[APP] Application initialized successfully');
                
            } catch (error) {
                console.error('[APP] Failed to initialize application:', error);
                
                // Show error message
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div style="padding: 2rem; text-align: center; color: #ff4444;">
                        <h1>Initialization Failed</h1>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: #ff4444; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            Reload
                        </button>
                    </div>
                `;
            }
        }

        // Global error handling
        window.addEventListener('error', (event) => {
            console.error('[APP] Global error:', event.error);
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('[APP] Unhandled promise rejection:', event.reason);
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeApplication);

        // Export for debugging
        window.SeedWorld = {
            appState: window.appState,
            kernelGates: window.appState.kernelGates,
            mainMenu: () => window.appState.mainMenuController
        };
    </script>
</body>
</html>
